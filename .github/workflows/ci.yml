name: Pipeline de CI/CD - Meu Primeiro Rob횄쨈

# Quando este workflow deve ser executado?

on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]

# Definindo os trabalhos (jobs) que ser횄짙o executados

jobs:

  # Job 1: Verifica횄짠횄쨉es b횄징sicas

  verificacoes-basicas:

    runs-on: ubuntu-latest

    steps:

    - name: 1. Baixando o c횄쨀digo do reposit횄쨀rio

      uses: actions/checkout@v4      

    - name: 2. Verificando estrutura do projeto

      run: |

        echo "Listando arquivos do projeto:"

        ls -la

        echo ""

        echo "Verificando se arquivos essenciais existem:"

        if [ -f "app.js" ]; then

          echo "app.js encontrado"

        else

          echo "app.js n횄짙o encontrado"

          exit 1

        fi

    - name: 3. Configurando Node.js

      uses: actions/setup-node@v4

      with:

        node-version: '18'

    - name: 4. Executando a aplica횄짠횄짙o

      run: |

        echo "Iniciando a aplica횄짠횄짙o..."

        node app.js

        echo "Aplica횄짠횄짙o executada com sucesso!"        

    - name: 5. Mensagem de sucesso

      run: |

        echo "Parab횄짤ns! Seu primeiro pipeline de CI est횄징 funcionando!"

        echo "Estat횄짯sticas da execu횄짠횄짙o:"

        echo "   - Reposit횄쨀rio: ${{ github.repository }}"

        echo "   - Branch: ${{ github.ref_name }}"

        echo "   - Commit: ${{ github.sha }}"

        echo "   - Autor: ${{ github.actor }}"